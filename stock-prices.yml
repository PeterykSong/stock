name: Daily Stock Prices

on:
  schedule:
    # 한국시간(KST) 매일 07:00 = 전날 22:00 UTC
    - cron: "0 22 * * *"
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write           # 결과 파일을 저장소에 커밋하기 위해 필요

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run stock price script
        run: python stock_prices.py

      - name: Upload result as artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-prices
          path: |
            stock_prices_result.csv
            stock_prices_result.md

      - name: Commit results back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_prices_result.csv stock_prices_result.md
          git commit -m "Update stock prices ($(date -u +%Y-%m-%d))" || echo "No changes to commit"
          git push
